<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PhotoSnap!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Hiragino Sans", "Meiryo", -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* パーティクル背景 */
    .bg-particles {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.3), transparent),
        radial-gradient(2px 2px at 40% 70%, rgba(255,200,100,0.2), transparent),
        radial-gradient(1px 1px at 60% 20%, rgba(255,255,255,0.4), transparent),
        radial-gradient(2px 2px at 80% 50%, rgba(100,200,255,0.2), transparent),
        radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1px 1px at 90% 10%, rgba(255,200,100,0.3), transparent),
        radial-gradient(2px 2px at 50% 90%, rgba(255,255,255,0.2), transparent),
        radial-gradient(1px 1px at 70% 60%, rgba(100,200,255,0.3), transparent);
      background-size: 200% 200%;
      animation: particleFloat 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes particleFloat {
      0% { background-position: 0% 0%; }
      100% { background-position: 100% 100%; }
    }

    /* メインアプリ */
    .app {
      position: relative;
      z-index: 1;
      max-width: 420px;
      margin: 0 auto;
      padding: 20px 16px 40px;
      min-height: 100vh;
    }

    /* ヘッダー */
    .app-header {
      text-align: center;
      padding: 24px 0 8px;
    }

    .title-glow {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 2px;
      color: #fff;
      text-shadow:
        0 0 10px rgba(255, 200, 100, 0.8),
        0 0 20px rgba(255, 200, 100, 0.5),
        0 0 40px rgba(255, 150, 50, 0.3);
    }

    .subtitle {
      font-size: 0.85rem;
      color: rgba(255, 200, 100, 0.7);
      margin-top: 4px;
      letter-spacing: 3px;
    }

    /* デコレーションライン */
    .deco-line {
      height: 2px;
      margin: 16px 0;
      background: linear-gradient(90deg, transparent, rgba(255, 200, 100, 0.5), transparent);
    }

    /* カード共通 */
    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 20px;
      margin: 16px 0;
      box-shadow:
        0 0 15px rgba(100, 100, 255, 0.15),
        inset 0 0 15px rgba(255, 255, 255, 0.03);
    }

    /* ステータスカード */
    .status-card-header {
      display: flex;
      align-items: center;
      font-size: 0.85rem;
      font-weight: bold;
      color: rgba(255, 255, 255, 0.8);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 10px;
      background: #555;
      transition: all 0.3s;
    }

    .status-dot.online {
      background: #43e97b;
      box-shadow: 0 0 8px #43e97b;
      animation: dotPulse 1.5s ease-in-out infinite;
    }

    .status-dot.offline {
      background: #ff5858;
      box-shadow: 0 0 8px #ff5858;
      animation: dotPulse 1.5s ease-in-out infinite;
    }

    @keyframes dotPulse {
      0%, 100% { box-shadow: 0 0 4px currentColor; }
      50% { box-shadow: 0 0 12px currentColor, 0 0 24px rgba(67, 233, 123, 0.2); }
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .stat-item:last-child {
      border-bottom: none;
    }

    .stat-label {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.85rem;
    }

    .stat-value {
      color: #ffd700;
      font-weight: bold;
      font-size: 1rem;
      text-shadow: 0 0 6px rgba(255, 215, 0, 0.3);
      transition: transform 0.3s;
    }

    @keyframes statBump {
      0% { transform: scale(1); }
      50% { transform: scale(1.4); color: #fff; text-shadow: 0 0 12px rgba(255, 215, 0, 0.8); }
      100% { transform: scale(1); }
    }

    .stat-bump {
      animation: statBump 0.6s ease-out;
    }

    /* ゲームボタン */
    .game-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 18px 24px;
      font-size: 1.15rem;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .game-btn:active {
      transform: scale(0.96);
    }

    .game-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      animation: none;
    }

    .game-btn:disabled::after {
      display: none;
    }

    /* シマーエフェクト */
    .game-btn::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -60%;
      width: 40%;
      height: 200%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.3),
        transparent
      );
      transform: skewX(-20deg);
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { left: -60%; }
      50% { left: 120%; }
    }

    /* 撮影ボタン */
    .capture-btn {
      background: linear-gradient(135deg, #f857a6, #ff5858);
      color: #fff;
      box-shadow: 0 4px 15px rgba(248, 87, 166, 0.4);
      animation: btnPulse 2s ease-in-out infinite;
      margin-top: 8px;
    }

    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 4px 15px rgba(248, 87, 166, 0.4); }
      50% { box-shadow: 0 4px 25px rgba(248, 87, 166, 0.7), 0 0 40px rgba(248, 87, 166, 0.2); }
    }

    /* アップロードボタン */
    .save-btn {
      background: linear-gradient(135deg, #43e97b, #38f9d7);
      color: #1a1a2e;
      box-shadow: 0 4px 15px rgba(67, 233, 123, 0.3);
      margin-top: 16px;
    }

    .save-btn:active {
      box-shadow: 0 2px 10px rgba(67, 233, 123, 0.5);
    }

    /* ファイルインプット非表示 */
    #fileInput {
      display: none;
    }

    /* プレビューカード */
    .preview-card-header {
      font-size: 0.85rem;
      font-weight: bold;
      color: rgba(255, 255, 255, 0.8);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .preview-img {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    /* トースト通知 */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: bold;
      animation: toastIn 0.4s ease-out;
      z-index: 100;
      max-width: 90%;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .toast.success {
      background: linear-gradient(135deg, #43e97b, #38f9d7);
      color: #1a1a2e;
    }

    .toast.error {
      background: linear-gradient(135deg, #f857a6, #ff5858);
      color: #fff;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @keyframes toastOut {
      from { opacity: 1; transform: translateX(-50%) translateY(0); }
      to { opacity: 0; transform: translateX(-50%) translateY(20px); }
    }

    /* バージョン表示 */
    .version-tag {
      text-align: center;
      color: rgba(255, 255, 255, 0.2);
      font-size: 0.7rem;
      margin-top: 24px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="bg-particles"></div>

  <div class="app">
    <!-- ヘッダー -->
    <header class="app-header">
      <h1 class="title-glow">PhotoSnap!</h1>
      <p class="subtitle">~ 写真撮影クエスト ~</p>
    </header>

    <div class="deco-line"></div>

    <!-- サーバーステータスカード -->
    <div class="card" id="statusCard">
      <div class="status-card-header">
        <span class="status-dot" id="statusDot"></span>
        <span>サーバーステータス</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">接続</span>
        <span class="stat-value" id="statusText">確認中...</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">稼働時間</span>
        <span class="stat-value" id="uptimeValue">--</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">撮影枚数</span>
        <span class="stat-value" id="photoCount">--</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">サーバー時刻</span>
        <span class="stat-value" id="serverTime">--</span>
      </div>
    </div>

    <!-- 撮影ボタン -->
    <div class="action-area">
      <button class="game-btn capture-btn" id="captureBtn">
        <span>📸</span>
        <span>撮影開始！</span>
      </button>
      <input type="file" id="fileInput" accept="image/*" capture="environment">
    </div>

    <!-- プレビューカード -->
    <div class="card" id="previewCard" style="display: none;">
      <div class="preview-card-header">撮影プレビュー</div>
      <img id="preview" class="preview-img" alt="プレビュー">
      <button class="game-btn save-btn" id="saveBtn">
        <span>📤</span>
        <span>アップロード</span>
      </button>
    </div>

    <div class="version-tag" id="versionTag">v--</div>
  </div>

  <!-- トースト通知 -->
  <div class="toast" id="toast" style="display: none;"></div>

  <script>
    const captureBtn = document.getElementById('captureBtn');
    const fileInput = document.getElementById('fileInput');
    const previewCard = document.getElementById('previewCard');
    const preview = document.getElementById('preview');
    const saveBtn = document.getElementById('saveBtn');
    const toast = document.getElementById('toast');

    let selectedFile = null;
    let lastPhotoCount = null;
    let toastTimer = null;

    // 撮影ボタン
    captureBtn.addEventListener('click', () => {
      fileInput.click();
    });

    // ファイル選択
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      selectedFile = file;

      const reader = new FileReader();
      reader.onload = (ev) => {
        preview.src = ev.target.result;
        previewCard.style.display = 'block';
      };
      reader.readAsDataURL(file);
    });

    // アップロード
    saveBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      saveBtn.disabled = true;
      saveBtn.querySelector('span:last-child').textContent = '送信中...';

      const formData = new FormData();
      formData.append('photo', selectedFile);

      try {
        const res = await fetch('/upload', {
          method: 'POST',
          body: formData
        });
        const data = await res.json();

        if (data.success) {
          showToast('success', `保存完了！ ${data.filename}`);
          previewCard.style.display = 'none';
          selectedFile = null;
          fileInput.value = '';
          fetchStatus(); // 即座にステータス更新
        } else {
          showToast('error', `エラー: ${data.error}`);
        }
      } catch (err) {
        showToast('error', '通信エラーが発生しました');
      }

      saveBtn.disabled = false;
      saveBtn.querySelector('span:last-child').textContent = 'アップロード';
    });

    // トースト表示
    function showToast(type, message) {
      if (toastTimer) clearTimeout(toastTimer);

      toast.className = `toast ${type}`;
      toast.textContent = message;
      toast.style.display = 'block';
      toast.style.animation = 'toastIn 0.4s ease-out';

      toastTimer = setTimeout(() => {
        toast.style.animation = 'toastOut 0.4s ease-in forwards';
        setTimeout(() => {
          toast.style.display = 'none';
        }, 400);
      }, 3000);
    }

    // ステータスポーリング
    async function fetchStatus() {
      try {
        const res = await fetch('/status');
        const data = await res.json();

        // ステータスドット
        document.getElementById('statusDot').className = 'status-dot online';
        document.getElementById('statusText').textContent = 'オンライン';

        // 稼働時間
        document.getElementById('uptimeValue').textContent = data.uptime_display;

        // 撮影枚数（変化時アニメーション）
        const countEl = document.getElementById('photoCount');
        if (lastPhotoCount !== null && data.photo_count > lastPhotoCount) {
          countEl.classList.add('stat-bump');
          setTimeout(() => countEl.classList.remove('stat-bump'), 600);
        }
        countEl.textContent = data.photo_count + ' 枚';
        lastPhotoCount = data.photo_count;

        // サーバー時刻
        document.getElementById('serverTime').textContent =
          new Date(data.server_time).toLocaleTimeString('ja-JP');

        // バージョン
        document.getElementById('versionTag').textContent = 'v' + data.version;

      } catch (err) {
        document.getElementById('statusDot').className = 'status-dot offline';
        document.getElementById('statusText').textContent = 'オフライン';
        document.getElementById('uptimeValue').textContent = '--';
        document.getElementById('photoCount').textContent = '--';
        document.getElementById('serverTime').textContent = '--';
      }
    }

    // 初回取得 & 5秒間隔ポーリング
    fetchStatus();
    setInterval(fetchStatus, 5000);
  </script>
</body>
</html>
