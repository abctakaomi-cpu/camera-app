<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>写真撮影</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      font-size: 1.5rem;
      color: #333;
      margin-bottom: 20px;
    }

    .container {
      width: 100%;
      max-width: 400px;
    }

    .capture-btn {
      display: block;
      width: 100%;
      padding: 16px;
      font-size: 1.1rem;
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
    }

    .capture-btn:active {
      background: #3a7bc8;
    }

    #fileInput {
      display: none;
    }

    .preview-area {
      margin-top: 20px;
      display: none;
    }

    .preview-area img {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .save-btn {
      display: block;
      width: 100%;
      margin-top: 16px;
      padding: 16px;
      font-size: 1.1rem;
      background: #34a853;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    .save-btn:active {
      background: #2d8f47;
    }

    .save-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-size: 0.95rem;
      display: none;
    }

    .message.success {
      display: block;
      background: #e6f4ea;
      color: #1e7e34;
    }

    .message.error {
      display: block;
      background: #fce8e6;
      color: #c5221f;
    }
  </style>
</head>
<body>
  <h1>写真撮影</h1>
  <div class="container">
    <button class="capture-btn" onclick="document.getElementById('fileInput').click()">
      カメラで撮影
    </button>
    <input type="file" id="fileInput" accept="image/*" capture="environment">

    <div class="preview-area" id="previewArea">
      <img id="preview" alt="プレビュー">
      <button class="save-btn" id="saveBtn" onclick="uploadPhoto()">
        PCに保存
      </button>
    </div>

    <div class="message" id="message"></div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const previewArea = document.getElementById('previewArea');
    const preview = document.getElementById('preview');
    const saveBtn = document.getElementById('saveBtn');
    const message = document.getElementById('message');

    let selectedFile = null;

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      selectedFile = file;
      message.className = 'message';
      message.style.display = 'none';

      const reader = new FileReader();
      reader.onload = (ev) => {
        preview.src = ev.target.result;
        previewArea.style.display = 'block';
      };
      reader.readAsDataURL(file);
    });

    async function uploadPhoto() {
      if (!selectedFile) return;

      saveBtn.disabled = true;
      saveBtn.textContent = '送信中...';

      const formData = new FormData();
      formData.append('photo', selectedFile);

      try {
        const res = await fetch('/upload', {
          method: 'POST',
          body: formData
        });
        const data = await res.json();

        if (data.success) {
          message.className = 'message success';
          message.textContent = `保存しました: ${data.filename}`;
        } else {
          message.className = 'message error';
          message.textContent = `エラー: ${data.error}`;
        }
      } catch (err) {
        message.className = 'message error';
        message.textContent = '通信エラーが発生しました';
      }

      saveBtn.disabled = false;
      saveBtn.textContent = 'PCに保存';
    }
  </script>
</body>
</html>
